# GuardianNode self-hosted server via Docker Compose.
#
# Two containers: ollama for local LLM, backend for the GuardianNode API + dashboard.
#
# Usage:
#   docker compose up -d
#   # then open http://127.0.0.1:8787 in your browser on the Docker host
#
# Persistent state:
#   - ollama_models   : downloaded model weights
#   - gn_data         : SQLite DB, encrypted blobs, encryption keys
#
# GPU support:
#   To enable nvidia GPU for Ollama, install nvidia-container-toolkit on the
#   host then uncomment the deploy.resources block under the ollama service.

services:
  ollama:
    image: ollama/ollama:0.13.5@sha256:2c9595c555fd70a28363489ac03bd5bf9e7c5bdf2890373c3a830ffd7252ce6d
    container_name: guardiannode_ollama
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    # Uncomment for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  backend:
    image: guardiannode/backend:local
    build:
      context: ../..
      dockerfile: installer/server-linux/Dockerfile.backend
    container_name: guardiannode_backend
    restart: unless-stopped
    depends_on:
      pipeline-init:
        condition: service_completed_successfully
    user: "10001:10001"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - GUARDIANNODE_OLLAMA_URL=http://ollama:11434
      - GUARDIANNODE_CLASSIFIER_MODE=${GUARDIANNODE_CLASSIFIER_MODE:-text_llm}
      - GUARDIANNODE_OCR_LANGUAGES=${GUARDIANNODE_OCR_LANGUAGES:-eng}
      - GUARDIANNODE_TEXT_MODEL=${GUARDIANNODE_TEXT_MODEL:-llama3.2:3b}
      - GUARDIANNODE_VISION_MODEL=${GUARDIANNODE_VISION_MODEL:-qwen3-vl:8b-instruct}
      - GUARDIANNODE_BIND_HOST=0.0.0.0
      - GUARDIANNODE_BIND_PORT=8787
      - GUARDIANNODE_MDNS_ENABLED=false
      - GUARDIANNODE_VISION_TIMEOUT_SECONDS=240
    ports:
      - "127.0.0.1:${GUARDIANNODE_HOST_PORT:-8787}:8787"
    volumes:
      - gn_data:/data
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m
    pids_limit: 512
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/api/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  pipeline-init:
    image: guardiannode/backend:local
    build:
      context: ../..
      dockerfile: installer/server-linux/Dockerfile.backend
    depends_on:
      ollama:
        condition: service_healthy
    user: "10001:10001"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - GUARDIANNODE_OLLAMA_URL=http://ollama:11434
      - GUARDIANNODE_CLASSIFIER_MODE=${GUARDIANNODE_CLASSIFIER_MODE:-text_llm}
      - GUARDIANNODE_OCR_LANGUAGES=${GUARDIANNODE_OCR_LANGUAGES:-eng}
      - GUARDIANNODE_TEXT_MODEL=${GUARDIANNODE_TEXT_MODEL:-llama3.2:3b}
      - GUARDIANNODE_VISION_MODEL=${GUARDIANNODE_VISION_MODEL:-qwen3-vl:8b-instruct}
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    command: ["guardiannode-backend", "preflight", "--pull-models", "--json"]

volumes:
  ollama_models:
  gn_data:
