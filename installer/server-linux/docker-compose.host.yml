# Optional host-network override for LAN discovery/mDNS on Linux hosts.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.host.yml up -d
#
# Do not expose the GuardianNode backend directly to the public internet.
# Requires Docker Compose v2.24+ for the custom !reset tag used below.

services:
  backend:
    network_mode: "host"
    environment:
      - GUARDIANNODE_OLLAMA_URL=http://127.0.0.1:11434
      - GUARDIANNODE_BIND_HOST=0.0.0.0
      - GUARDIANNODE_MDNS_ENABLED=true
    ports: !reset []

  ollama:
    network_mode: "host"
    ports: !reset []
