site_name: GuardianNode
site_description: >-
  Local-first, open-source AI safety monitor for families. Detects grooming,
  bullying, scams, explicit content, and self-harm signals — without sending
  child data to the cloud.
site_url: https://the-vibe-dev.github.io/guardiannode/
repo_url: https://github.com/the-vibe-dev/guardiannode
repo_name: the-vibe-dev/guardiannode
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/brand/icon.png
  favicon: assets/brand/favicon-32.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    scheme: default
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/brand.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details

validation:
  links:
    not_found: warn
    absolute_links: ignore
    unrecognized_links: ignore

exclude_docs: |
  overrides/

