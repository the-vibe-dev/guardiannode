name: release-installers

# Release artifacts are fail-closed: tagged builds carry RELEASE_BUILD=1 and
# refuse to ship dev stubs. Real PyInstaller bundles are built on
# windows-latest so no parent or child machine ever needs Python installed.

on:
  push:
    tags:
      - "v*-installer-test*"
  workflow_dispatch:

env:
  INNO_INSTALLER_URL: "https://github.com/jrsoftware/issrc/releases/download/is-6_7_1/innosetup-6.7.1.exe"
  INNO_INSTALLER_SHA256: "4d11e8050b6185e0d49bd9e8cc661a7a59f44959a621d31d11033124c4e8a7b0"
  WINSW_URL: "https://github.com/winsw/winsw/releases/download/v2.12.0/WinSW-x64.exe"
  WINSW_SHA256: "05b82d46ad331cc16bdc00de5c6332c1ef818df8ceefcd49c726553209b3a0da"

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install backend test dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile backend
        run: python -m compileall backend/app
      - name: Check version consistency
        run: python scripts/check_version_consistency.py
      - name: Check tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-installer-test')
        shell: bash
        run: |
          expected="v$(cat VERSION)"
          if [ "${GITHUB_REF_NAME}" != "$expected" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION ${expected}" >&2
            exit 1
          fi
      - name: Run backend tests
        working-directory: backend
        run: pytest

  test-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install agent test dependencies
        working-directory: agent-windows
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile agent
        run: python -m compileall agent-windows/src
      - name: Run agent tests
        working-directory: agent-windows
        run: pytest

  test-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci
      - name: Typecheck dashboard
        working-directory: dashboard
        run: npm run typecheck
      - name: Run dashboard tests
        working-directory: dashboard
        run: npm test -- --run

  build-dashboard:
    runs-on: ubuntu-latest
    needs: [test-dashboard]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Build dashboard
        working-directory: dashboard
        run: |
          npm ci
          npm run build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dashboard-dist
          path: dashboard/dist/

  build-backend-exe:
    runs-on: windows-latest
    needs: [test-backend]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install backend + PyInstaller
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller
      - name: Build backend bundle
        working-directory: backend
        run: pyinstaller --noconfirm guardiannode_backend.spec
      - name: Smoke-test bundle exists
        working-directory: backend
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/GuardianNodeBackend/GuardianNodeBackend.exe")) {
            throw "backend bundle missing"
          }
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-bundle
          path: backend/dist/GuardianNodeBackend/

  build-agent-exe:
    runs-on: windows-latest
    needs: [test-agent]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install agent + PyInstaller
        working-directory: agent-windows
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[windows]"
          pip install pyinstaller
      - name: Build agent bundle
        working-directory: agent-windows
        run: pyinstaller --clean --noconfirm guardiannode_agent.spec
      - name: Verify agent bundle
        working-directory: agent-windows
        shell: pwsh
        run: ./scripts/verify_windows_bundle.ps1
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent-bundle
          path: agent-windows/dist/GuardianNodeAgent/

  build-installers:
    runs-on: windows-latest
    needs: [build-dashboard, build-backend-exe, build-agent-exe]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dashboard-dist
          path: installer/build/stage/dashboard
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: backend-bundle
          path: installer/build/stage/backend
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: agent-bundle
          path: installer/build/stage/agent

      - name: Fail closed if bundles are not real executables
        shell: pwsh
        run: |
          # RELEASE_BUILD equivalent for the Windows path: never compile an
          # installer around missing/stub payloads.
          if (-not (Test-Path "installer/build/stage/backend/GuardianNodeBackend.exe")) {
            throw "Release build requires the PyInstaller backend bundle"
          }
          if (-not (Test-Path "installer/build/stage/agent/GuardianNodeAgent.exe")) {
            throw "Release build requires the PyInstaller agent bundle"
          }
          if (Get-ChildItem "installer/build/stage" -Recurse -Filter "*.exe.bat") {
            throw "Dev .bat stubs found in release staging - aborting"
          }

      - name: Stage WinSW (pinned SHA-256)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force installer/build/stage/winsw | Out-Null
          Invoke-WebRequest -Uri $env:WINSW_URL -OutFile installer/build/stage/winsw/WinSW.exe
          $actual = (Get-FileHash installer/build/stage/winsw/WinSW.exe -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $env:WINSW_SHA256) {
            throw "WinSW SHA-256 mismatch: expected $env:WINSW_SHA256 got $actual"
          }
          Copy-Item installer/build/winsw_templates/Watchdog.xml installer/build/stage/winsw/
          Copy-Item installer/build/winsw_templates/Helper.xml   installer/build/stage/winsw/
          Copy-Item installer/build/winsw_templates/Backend.xml  installer/build/stage/winsw/

      - name: Install Inno Setup
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:INNO_INSTALLER_URL -OutFile innosetup.exe
          $actual = (Get-FileHash innosetup.exe -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $env:INNO_INSTALLER_SHA256) {
            throw "Inno Setup SHA-256 mismatch: expected $env:INNO_INSTALLER_SHA256 got $actual"
          }
          Start-Process -FilePath .\innosetup.exe -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-" -Wait

      - name: Compile installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force installer/build/dist | Out-Null
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer\child-device-windows\GuardianNodeChildSetup.iss
          if ($LASTEXITCODE -ne 0) { throw "child installer compile failed" }
          & $iscc installer\server-windows\GuardianNodeServerSetup.iss
          if ($LASTEXITCODE -ne 0) { throw "server installer compile failed" }

      - name: Generate checksums + release manifest
        shell: pwsh
        working-directory: installer/build/dist
        run: |
          $lines = @()
          foreach ($f in Get-ChildItem *.exe) {
            $h = (Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLower()
            $lines += "$h  $($f.Name)"
          }
          $lines | Set-Content -Encoding ascii SHA256SUMS
          Get-Content SHA256SUMS
          @{
            tag = "${{ github.ref_name }}"
            commit = "${{ github.sha }}"
            built_at = (Get-Date).ToUniversalTime().ToString("o")
            artifacts = (Get-ChildItem *.exe | ForEach-Object { $_.Name })
          } | ConvertTo-Json | Set-Content -Encoding ascii release-manifest.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-installers
          path: installer/build/dist/*

      - name: Create GitHub Release (draft)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            installer/build/dist/*.exe
            installer/build/dist/SHA256SUMS
            installer/build/dist/release-manifest.json
          body_path: docs/RELEASE_NOTES_0.1.0-alpha.1.md
          draft: true
          prerelease: true

  build-linux-docker:
    runs-on: ubuntu-latest
    needs: [test-backend, test-dashboard]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: installer/server-linux/Dockerfile.backend
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}
