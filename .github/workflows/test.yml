name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run actionlint
        shell: bash
        run: |
          set -euo pipefail
          version=1.7.7
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz" \
            | tar -xz actionlint
          ./actionlint

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install uv==0.11.28 pip-audit==2.10.1
          uv sync --frozen --extra dev
      - name: Compile check
        working-directory: backend
        run: uv run python -m compileall -q app tests
      - name: Check feature matrix
        run: python scripts/check_feature_matrix.py
      - name: Check version consistency
        run: python scripts/check_version_consistency.py
      - name: Run backend tests
        working-directory: backend
        run: uv run pytest -v
      - name: Run synthetic E2E
        working-directory: backend
        run: uv run pytest -v ../tests/e2e
      - name: Enforce classifier quality and latency gates
        run: python scripts/run_classifier_benchmark.py --mode rules
      - name: Lint
        working-directory: backend
        run: uv run ruff check app tests
      - name: Type check
        working-directory: backend
        run: uv run mypy app
      - name: Dependency audit
        working-directory: backend
        run: |
          uv export --frozen --no-dev --no-emit-project --output-file /tmp/backend-requirements.txt
          pip-audit --strict --requirement /tmp/backend-requirements.txt

  release-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install test runner
        run: python -m pip install --upgrade pip pytest
      - name: Shell syntax
        run: bash -n installer/server-linux/install.sh
      - name: Run release script tests
        run: pytest -v tests
      - name: Check generated hardware tier constants
        run: python scripts/sync_hardware_tiers.py --check
      - name: Check third-party notices
        run: python scripts/check_third_party_notices.py
      - name: Check repository governance files
        run: python scripts/check_repository_controls.py

  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install agent
        working-directory: agent-windows
        run: |
          python -m pip install uv==0.11.28
          uv sync --frozen --extra dev
      - name: Compile check
        working-directory: agent-windows
        run: uv run python -m compileall -q src tests
      - name: Run agent tests
        working-directory: agent-windows
        run: uv run pytest -v
      - name: Lint
        working-directory: agent-windows
        run: uv run ruff check src tests
      - name: Dependency audit
        working-directory: agent-windows
        run: |
          python -m pip install pip-audit==2.10.1
          uv export --frozen --no-dev --no-emit-project --output-file /tmp/agent-requirements.txt
          pip-audit --strict --requirement /tmp/agent-requirements.txt

  agent-windows-bundle:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install agent + PyInstaller
        working-directory: agent-windows
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[windows]"
          pip install pyinstaller==6.16.0
      - name: Build agent bundle
        working-directory: agent-windows
        run: pyinstaller --clean --noconfirm guardiannode_agent.spec
      - name: Verify agent bundle
        working-directory: agent-windows
        shell: pwsh
        run: ./scripts/verify_windows_bundle.ps1

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Install dashboard
        working-directory: dashboard
        run: npm ci
      - name: Typecheck
        working-directory: dashboard
        run: npm run typecheck
      - name: Unit tests
        working-directory: dashboard
        run: npm test -- --run
      - name: Build
        working-directory: dashboard
        run: npm run build
      # No ESLint config exists yet; add `npm run lint` once one is adopted.

  docker-canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install canary client
        run: python -m pip install httpx Pillow
      - name: Prove clean Docker OCR-to-alert pipeline
        run: python scripts/docker_canary.py
