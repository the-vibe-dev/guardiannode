name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run actionlint
        shell: bash
        run: |
          set -euo pipefail
          version=1.7.7
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz" \
            | tar -xz actionlint
          ./actionlint

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile check
        working-directory: backend
        run: python -m compileall -q app tests
      - name: Check feature matrix
        run: python scripts/check_feature_matrix.py
      - name: Check version consistency
        run: python scripts/check_version_consistency.py
      - name: Run backend tests
        working-directory: backend
        run: pytest -v
      - name: Lint (ruff, non-blocking until baseline is clean)
        working-directory: backend
        continue-on-error: true
        run: |
          pip install ruff
          ruff check app tests
      - name: Dependency audit (non-blocking)
        working-directory: backend
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit

  release-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install test runner
        run: python -m pip install --upgrade pip pytest
      - name: Shell syntax
        run: bash -n installer/server-linux/install.sh
      - name: Run release script tests
        run: pytest -v tests
      - name: Check generated hardware tier constants
        run: python scripts/sync_hardware_tiers.py --check
      - name: Check third-party notices
        run: python scripts/check_third_party_notices.py
      - name: Check repository governance files
        run: python scripts/check_repository_controls.py

  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install agent
        working-directory: agent-windows
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile check
        working-directory: agent-windows
        run: python -m compileall -q src tests
      - name: Run agent tests
        working-directory: agent-windows
        run: pytest -v
      - name: Lint (ruff, non-blocking until baseline is clean)
        working-directory: agent-windows
        continue-on-error: true
        run: |
          pip install ruff
          ruff check src tests

  agent-windows-bundle:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install agent + PyInstaller
        working-directory: agent-windows
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[windows]"
          pip install pyinstaller
      - name: Build agent bundle
        working-directory: agent-windows
        run: pyinstaller --clean --noconfirm guardiannode_agent.spec
      - name: Verify agent bundle
        working-directory: agent-windows
        shell: pwsh
        run: ./scripts/verify_windows_bundle.ps1

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Install dashboard
        working-directory: dashboard
        run: npm ci
      - name: Typecheck
        working-directory: dashboard
        run: npm run typecheck
      - name: Unit tests
        working-directory: dashboard
        run: npm test -- --run
      - name: Build
        working-directory: dashboard
        run: npm run build
      # No ESLint config exists yet; add `npm run lint` once one is adopted.
