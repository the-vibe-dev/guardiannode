name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile check
        working-directory: backend
        run: python -m compileall -q app tests
      - name: Run backend tests
        working-directory: backend
        run: pytest -v
      - name: Lint (ruff, non-blocking until baseline is clean)
        working-directory: backend
        continue-on-error: true
        run: |
          pip install ruff
          ruff check app tests
      - name: Dependency audit (non-blocking)
        working-directory: backend
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit

  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install agent
        working-directory: agent-windows
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile check
        working-directory: agent-windows
        run: python -m compileall -q src tests
      - name: Run agent tests
        working-directory: agent-windows
        run: pytest -v
      - name: Lint (ruff, non-blocking until baseline is clean)
        working-directory: agent-windows
        continue-on-error: true
        run: |
          pip install ruff
          ruff check src tests

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dashboard
        working-directory: dashboard
        run: npm ci
      - name: Typecheck
        working-directory: dashboard
        run: npm run typecheck
      - name: Unit tests
        working-directory: dashboard
        run: npm test -- --run
      - name: Build
        working-directory: dashboard
        run: npm run build
      # No ESLint config exists yet; add `npm run lint` once one is adopted.
