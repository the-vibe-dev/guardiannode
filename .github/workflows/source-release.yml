name: source-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    if: ${{ !contains(github.ref_name, '-installer-test') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Check tag matches VERSION
        shell: bash
        run: |
          expected="v$(cat VERSION)"
          if [ "${GITHUB_REF_NAME}" != "$expected" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION ${expected}" >&2
            exit 1
          fi

      - name: Install backend and run checks
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m compileall -q app tests
          pytest -v
          pip install pip-audit
          pip-audit --strict .

      - name: Install agent and run checks
        working-directory: agent-windows
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m compileall -q src tests
          pytest -v
          ruff check src tests
          pip-audit --strict .

      - name: Run release helper checks
        run: |
          python scripts/check_feature_matrix.py
          python scripts/check_version_consistency.py
          python scripts/run_classifier_benchmark.py --mode rules
          python scripts/sync_hardware_tiers.py --check
          python scripts/check_third_party_notices.py
          python scripts/check_repository_controls.py
          bash -n installer/server-linux/install.sh
          pytest -v tests

      - name: Build docs strictly
        run: |
          pip install mkdocs-material
          mkdocs build --strict --site-dir _site

      - name: Build dashboard
        working-directory: dashboard
        run: |
          npm ci
          npm run typecheck
          npm test -- --run
          npm run build
          diff -qr dist ../backend/app/static

      - name: Guard source-only release assets
        shell: bash
        run: |
          if find . \
            -path ./.git -prune -o \
            -path ./local_config -prune -o \
            -type f \( -iname '*.exe' -o -iname '*.msi' \) -print | grep -q .; then
            echo "Source alpha release must not include Windows installer artifacts." >&2
            exit 1
          fi

  release:
    if: ${{ !contains(github.ref_name, '-installer-test') }}
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Create source-only GitHub prerelease
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body_path: docs/RELEASE_NOTES_0.1.0-alpha.1.md
          draft: false
          prerelease: true
